<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema Web{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background-color: #212529;">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}"><i class="bi bi-cpu"></i> Sistema Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('catalogo') }}">Tienda</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('servicios') }}">Servicios</a></li>
                    
                    {% if current_user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link text-success" href="{{ url_for('mis_tickets') }}"><i class="bi bi-tags"></i> Tickets</a></li>
                        {% if current_user.rol == 'admin' %}
                            <li class="nav-item"><a class="nav-link" href="{{ url_for('inventario') }}">Inventario</a></li>
                            <li class="nav-item"><a class="nav-link text-info" href="{{ url_for('lista_usuarios') }}"><i class="bi bi-people"></i> Usuarios</a></li>
                            <li class="nav-item"><a class="nav-link text-warning" href="{{ url_for('datos') }}"><i class="bi bi-database"></i> Respaldos</a></li>
                        {% endif %}
                        <li class="nav-item"><a class="nav-link text-danger fw-bold" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Salir</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link text-info fw-bold" href="{{ url_for('login') }}"><i class="bi bi-person-circle"></i> Entrar</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <main class="container mt-5 mb-5">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
