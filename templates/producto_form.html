{% extends "base.html" %}
{% block content %}
<h2>Añadir Nuevo Producto</h2>
<form action="/guardar" method="POST">
    <label for="nombre">Nombre del Producto:</label>
    <input type="text" id="nombre" name="nombre" required><br><br>

    <label for="precio">Precio:</label>
    <input type="number" name="precio" class="form-control bg-dark text-light border-secondary" min="0" step="0.01" oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');" required>

    <label for="cantidad">Cantidad en Stock:</label>
    <input type="number" name="cantidad" class="form-control bg-dark text-light border-secondary" min="0" step="1" oninput="this.value = this.value.replace(/[^0-9]/g, '');" required>

    <button type="submit">Guardar Producto</button>
</form>
{% endblock %}
